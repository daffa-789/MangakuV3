<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Otaku Shelf | Reader Manga</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap-icons/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="/node_modules/sweetalert2/dist/sweetalert2.min.css" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/node_modules/sweetalert2/dist/sweetalert2.all.min.js" defer></script>
    <script src="/js/core.js" defer></script>
    <script src="/js/Api.js" defer></script>
    <script src="/js/session.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <script src="/js/read.js" defer></script>
  </head>
  <body class="reader-page">
    <div class="reader-container">
      <!-- Top Bar -->
      <header class="reader-header">
        <div class="reader-header-content">
          <div class="reader-header-left">
            <a
              id="readerDashboardLink"
              class="reader-header-back"
              href="/home.html"
              aria-label="Kembali ke dashboard"
              title="Kembali ke dashboard">
              <i class="bi bi-chevron-left" aria-hidden="true"></i>
            </a>
            <div class="reader-header-info">
              <h1 id="readerBookTitle" class="reader-header-title">
                Loading...
              </h1>
              <span id="readerSubtitle" class="reader-header-subtitle">-</span>
            </div>
          </div>

          <div class="reader-header-right">
            <button
              id="readerHeaderToggle"
              class="reader-header-back"
              type="button"
              aria-label="Sembunyikan header"
              title="Sembunyikan header">
              <i class="bi bi-chevron-up" aria-hidden="true"></i>
            </button>
            <button
              id="readerRightToggle"
              class="reader-header-back"
              type="button"
              aria-label="Buka sidebar kanan"
              title="Buka sidebar kanan">
              <i class="bi bi-list" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </header>

      <div class="reader-layout">
        <!-- Right Sidebar -->
        <aside id="readerRightSidebar" class="reader-right-sidebar">
          <div class="reader-sidebar-header">
            <h3>Daftar Chapter</h3>
            <p id="readerRightChapterMeta" class="reader-right-meta">-</p>
            <button
              id="readerRightClose"
              class="reader-sidebar-close"
              type="button"
              aria-label="Tutup sidebar kanan">
              <i class="bi bi-chevron-right" aria-hidden="true"></i>
            </button>
          </div>
          <div class="reader-right-content">
            <section class="reader-right-section">
              <div
                id="readerRightChapterList"
                class="reader-chapter-list"></div>
            </section>
          </div>
        </aside>

        <!-- Main Reader Area -->
        <main class="reader-main">
          <div id="readerScroll" class="reader-scroll">
            <article id="readerContent" class="reader-view"></article>

            <section id="chapterEngagement" class="chapter-engagement" hidden>
              <div class="chapter-engagement-inner">
                <header class="chapter-engagement-header">
                  <h2>Interaksi Chapter</h2>
                  <p id="chapterEngagementSubtitle" class="chapter-engagement-subtitle"></p>
                </header>

                <div class="chapter-rating-block">
                  <h3>Rating Chapter</h3>
                  <div
                    id="chapterRatingStars"
                    class="chapter-rating-stars"
                    role="group"
                    aria-label="Rating chapter"></div>
                  <p id="chapterRatingSummary" class="chapter-rating-summary">
                    Belum ada rating
                  </p>
                </div>

                <div class="chapter-reaction-block">
                  <h3>Reaksi</h3>
                  <div
                    id="chapterReactionBar"
                    class="chapter-reaction-bar"
                    role="group"
                    aria-label="Reaksi chapter"></div>
                </div>

                <div class="chapter-comment-block">
                  <h3>Komentar</h3>
                  <form id="chapterCommentForm" class="chapter-comment-form">
                    <textarea
                      id="chapterCommentInput"
                      class="chapter-comment-input"
                      rows="3"
                      maxlength="1000"
                      placeholder="Tulis komentar untuk chapter ini..."></textarea>
                    <button type="submit" class="primary-button small">
                      Kirim
                    </button>
                  </form>
                  <div id="chapterCommentList" class="chapter-comment-list"></div>
                </div>
              </div>
            </section>
          </div>

          <!-- Chapter Navigation -->
          <footer class="reader-footer">
            <div class="reader-footer-content">
              <button
                id="readerPrevButton"
                class="reader-nav-button"
                type="button"
                aria-label="Chapter sebelumnya"
                title="Chapter sebelumnya">
                <i class="bi bi-chevron-left" aria-hidden="true"></i>
              </button>

              <span id="readerPageCounter" class="reader-page-counter">-</span>

              <button
                id="readerNextButton"
                class="reader-nav-button"
                type="button"
                aria-label="Chapter berikutnya"
                title="Chapter berikutnya">
                <i class="bi bi-chevron-right" aria-hidden="true"></i>
              </button>
            </div>
          </footer>
        </main>
      </div>
    </div>

    <button
      id="readerHeaderRestore"
      class="reader-header-restore"
      type="button"
      aria-label="Tampilkan header"
      title="Tampilkan header">
      <i class="bi bi-chevron-down" aria-hidden="true"></i>
    </button>

    <div id="readerSidebarOverlay" class="reader-sidebar-overlay" hidden></div>
  </body>
</html>
