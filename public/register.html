<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Mangaku</title>
     <link
      rel="stylesheet"
      href="/node_modules/bootstrap-icons/font/bootstrap-icons.css"/>
    <link rel="stylesheet" href="/node_modules/sweetalert2/dist/sweetalert2.min.css" />
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/node_modules/sweetalert2/dist/sweetalert2.all.min.js" defer></script>
    <script src="/js/core.js" defer></script>
    <script src="/js/Api.js" defer></script>
    <script src="/js/session.js" defer></script>
    <script src="/js/alerts.js" defer></script>
    <script src="/js/auth.js" defer></script>
  </head>
  <body class="auth-page">
    <main class="auth-layout">
      <section class="auth-card">
        <div class="auth-heading">
          <h1>Register</h1>
        </div>

        <form id="registerForm" class="auth-form" novalidate>
          <label for="registerEmail">Email</label>
          <input
            id="registerEmail"
            name="email"
            type="email"
            placeholder="nama@email.com"
            autocomplete="email"
            required />

          <label for="registerPassword">Password</label>
          <div class="password-input-wrap">
            <input
              id="registerPassword"
              name="password"
              type="password"
              placeholder="Minimal 6 karakter"
              autocomplete="new-password"
              required />
            <button
              type="button"
              class="auth-password-toggle"
              data-toggle-password
              data-target="registerPassword"
              aria-label="Tampilkan password">
              <i class="bi bi-eye" data-eye-open></i>
              <i class="bi bi-eye-slash hidden" data-eye-off></i>
            </button>
          </div>

          <button
            type="submit"
            class="primary-button auth-submit"
            data-default-text="Daftar">
            Daftar
          </button>
        </form>

        <p class="switch-link">
          Sudah punya akun? <a href="/login.html">Kembali ke login</a>
        </p>
      </section>
    </main>
  </body>
</html>
